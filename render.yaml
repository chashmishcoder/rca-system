services:
  # Backend API (Web Service)
  - type: web
    name: rca-backend
    env: python
    rootDir: deployment/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn rca_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GROQ_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
    healthCheckPath: /api/health

  # Frontend Dashboard (Static Site)
  - type: web
    name: rca-frontend
    env: static
    rootDir: deployment/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: out
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://rca-backend-5jlv.onrender.com
